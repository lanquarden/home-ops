---
- name: Configure MikroTik devices
  hosts: mikrotik
  gather_facts: false
  vars_files:
    - "../inventory/group_vars/secrets.yml"
    - "../inventory/group_vars/networks.yml"
    - "../inventory/group_vars/leases.yml"
    - "../inventory/group_vars/dns.yml"

  tasks:
    - name: Rename interfaces for lab simulation
      when: "'lab' in group_names"
      community.routeros.command:
        commands:
          - /interface set [ find name="ether1" ] name="sfp-sfpplus1"
          - /interface set [ find name="ether2" ] name="sfp-sfpplus2"
      ignore_errors: true

    - name: Configure identity
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: system identity
        find: {}
        values: "{{ routeros.system_identity }}"
      when: routeros.system_identity is defined

    - name: Configure bridges
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface bridge
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.bridge | default([]) }}"

    - name: Configure VLANs
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface vlan
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.vlan | default([]) }}"

    - name: Configure Interface Lists
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface list
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.interface_list | default([]) }}"

    - name: Configure Interface List Members
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface list member
        find:
          interface: "{{ item.interface }}"
          list: "{{ item.list }}"
        values: "{{ item }}"
      loop: "{{ routeros.interface_list_member | default([]) }}"

    - name: Configure PPPoE Client
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface pppoe-client
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.interface_pppoe_client | default([]) }}"

    - name: Configure DHCP Client
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip dhcp-client
        find:
          interface: "{{ item.interface }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_dhcp_client | default([]) }}"

    - name: Configure bridge ports
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface bridge port
        find:
          interface: "{{ item.interface }}"
        values: "{{ item }}"
      loop: "{{ routeros.bridge_port | default([]) }}"

    - name: Configure bridge VLANs
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: interface bridge vlan
        find:
          vlan-ids: "{{ item['vlan-ids'] }}"
        values: "{{ item }}"
      loop: "{{ routeros.bridge_vlan | default([]) }}"

    - name: Configure IP pools
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip pool
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_pool | default([]) }}"

    - name: Configure IP addresses
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip address
        find:
          address: "{{ item.address }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_address | default([]) }}"

    - name: Configure DHCP Server Networks
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip dhcp-server network
        find:
          address: "{{ item.address }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_dhcp_server_network | default([]) }}"

    - name: Configure DHCP Servers
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip dhcp-server
        find:
          name: "{{ item.name }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_dhcp_server | default([]) }}"

    - name: Configure DHCP Server Leases
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip dhcp-server lease
        find:
          mac-address: "{{ item['mac-address'] }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_dhcp_server_lease | default([]) }}"

    - name: Configure DNS Statics
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip dns static
        find: "{{ {'name': item.name} if item.name is defined else {'regexp': item.regexp} }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_dns_static | default([]) }}"

    - name: Configure Firewall Address Lists
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip firewall address-list
        find:
          address: "{{ item.address }}"
          list: "{{ item.list }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_firewall_address_list | default([]) }}"

    - name: Configure Firewall Filter
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip firewall filter
        find:
          comment: "{{ item.comment | default('') }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_firewall_filter | default([]) }}"

    - name: Configure Firewall NAT
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip firewall nat
        find:
          comment: "{{ item.comment | default('') }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_firewall_nat | default([]) }}"

    - name: Configure Static Routes
      community.routeros.api_find_and_modify:
        hostname: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        path: ip route
        find:
          dst-address: "{{ item['dst-address'] }}"
        values: "{{ item }}"
      loop: "{{ routeros.ip_route | default([]) }}"

- name: Configure SwOS devices
  hosts: mikrotik
  gather_facts: false
  tasks:
    - name: Apply SwOS configuration
      when: swos_config is defined
      swos:
        host: "{{ ansible_host }}"
        username: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        config: "{{ swos_config }}"
