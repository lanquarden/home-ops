---
# Define port groups for easier maintenance
trunk_ports: [ether17, ether18, ether23, ether24]
not_access_ports: [ether1, ether2, ether3, ether4, ether5, ether6, ether7, ether8]

routeros:
  system_identity:
    name: switch3

  interface:
    - { name: ether1, comment: Doorbell }
    - { name: ether2, comment: "Cam livingroom" }
    - { name: ether3, comment: "Cam garden" }
    - { name: ether4, comment: "Cam porch" }
    - { name: ether5, comment: "Cam garage" }
    - { name: ether6, comment: "Cam entrance" }
    - { name: ether7, comment: "Cam front" }
    - { name: ether8, comment: "Cam office" }
    - { name: ether17, comment: ap-livingroom }
    - { name: ether18, comment: ap-office }
    - { name: ether19, comment: TV }
    - { name: ether23, comment: uplink-office-1 }
    - { name: ether24, comment: uplink-office-2 }

  bridge:
    - name: bridge
      vlan_filtering: true
      admin_mac: "DC:2C:6E:8D:87:85"
      auto_mac: false
      comment: defconf

  bridge_port: >-
    {%- set ports = [] -%}
    {# NoT Access Ports #}
    {%- for port in not_access_ports -%}
      {%- set _ = ports.append({
        "bridge": "bridge",
        "interface": port,
        "pvid": 30,
        "frame_types": "admit-only-untagged-and-priority-tagged"
      }) -%}
    {%- endfor -%}
    {# Other Ports (PVID 1) #}
    {%- for port in ['ether9','ether10','ether11','ether12','ether13','ether14','ether15','ether16','ether17','ether18','ether19','ether20','ether21','ether22','ether23','ether24','sfp-sfpplus1','sfp-sfpplus2','sfp-sfpplus3','sfp-sfpplus4'] -%}
      {%- set _ = ports.append({"bridge": "bridge", "interface": port}) -%}
    {%- endfor -%}
    {{ ports }}

  bridge_vlan:
    - { bridge: bridge, vlan_ids: 20, tagged: "{{ trunk_ports }}" }
    - { bridge: bridge, vlan_ids: 30, tagged: "{{ trunk_ports }}", untagged: "{{ not_access_ports }}" }
    - { bridge: bridge, vlan_ids: 100, tagged: "{{ trunk_ports }}" }

  ip_address:
    - address: 192.168.1.4/24
      interface: bridge
      comment: Management IP

  ip_route:
    - dst_address: 0.0.0.0/0
      gateway: 192.168.1.1
