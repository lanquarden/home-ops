---
# Define port groups for easier maintenance
trunk_ports: [ether17, ether18, ether23, ether24]
not_access_ports: [ether1, ether2, ether3, ether4, ether5, ether6, ether7, ether8]

# Helper to resolve VLAN names to IDs from group_vars/mikrotik/networks.yml
vlan_ids: >-
  {%- set ids = {} -%}
  {%- for vlan in network_vlans -%}
    {%- set _ = ids.update({vlan.name: vlan.id}) -%}
  {%- endfor -%}
  {{ ids }}

# Automatically generate all 28 ports
all_ports: >-
  {%- set ports = [] -%}
  {%- for i in range(1, 25) -%}
    {%- set _ = ports.append('ether' ~ i) -%}
  {%- endfor -%}
  {%- for i in range(1, 5) -%}
    {%- set _ = ports.append('sfp-sfpplus' ~ i) -%}
  {%- endfor -%}
  {{ ports }}

routeros:
  system_identity:
    name: switch3

  interface:
    - { name: ether1, comment: Doorbell }
    - { name: ether2, comment: "Cam livingroom" }
    - { name: ether3, comment: "Cam garden" }
    - { name: ether4, comment: "Cam porch" }
    - { name: ether5, comment: "Cam garage" }
    - { name: ether6, comment: "Cam entrance" }
    - { name: ether7, comment: "Cam front" }
    - { name: ether8, comment: "Cam office" }
    - { name: ether17, comment: ap-livingroom }
    - { name: ether18, comment: ap-office }
    - { name: ether19, comment: TV }
    - { name: ether23, comment: uplink-office-1 }
    - { name: ether24, comment: uplink-office-2 }

  bridge:
    - name: bridge
      vlan-filtering: true
      admin-mac: "DC:2C:6E:8D:87:85"
      auto-mac: false
      comment: defconf

  bridge_port: >-
    {%- set ports = [] -%}
    {%- for port in all_ports -%}
      {%- set vlan_id = vlan_ids.NoT if port in not_access_ports else vlan_ids.LAN -%}
      {%- set entry = {"bridge": "bridge", "interface": port} -%}
      {%- if vlan_id != vlan_ids.LAN -%}
        {%- set _ = entry.update({
          "pvid": vlan_id,
          "frame-types": "admit-only-untagged-and-priority-tagged"
        }) -%}
      {%- endif -%}
      {%- set _ = ports.append(entry) -%}
    {%- endfor -%}
    {{ ports }}

  bridge_vlan:
    - { bridge: bridge, vlan-ids: "{{ vlan_ids.IoT }}", tagged: "{{ trunk_ports | join(',') }}" }
    - { bridge: bridge, vlan-ids: "{{ vlan_ids.NoT }}", tagged: "{{ trunk_ports | join(',') }}", untagged: "{{ not_access_ports | join(',') }}" }
    - { bridge: bridge, vlan-ids: "{{ vlan_ids.Guest }}", tagged: "{{ trunk_ports | join(',') }}" }

  ip_address:
    - address: 192.168.1.4/24
      interface: bridge
      comment: Management IP

  ip_route:
    - dst-address: 0.0.0.0/0
      gateway: 192.168.1.1
