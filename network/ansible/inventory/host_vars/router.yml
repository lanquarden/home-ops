---
wan_type: dhcp

routeros:
  system_identity:
    name: router

  bridge:
    - name: bridge
      vlan_filtering: true
      pvid: 1

  vlan: >-
    {%- set vlans = [] -%}
    {%- for net in network_vlans if not net.untagged | default(false) -%}
      {%- set _ = vlans.append({
        "name": "vlan" ~ net.id ~ "-" ~ net.name,
        "interface": "bridge",
        "vlan_id": net.id
      }) -%}
    {%- endfor -%}
    {{ vlans }}

  interface_list:
    - name: WAN
    - name: LAN

  interface_list_member: >-
    {%- set members = [] -%}
    {# WAN #}
    {%- if wan_type == 'pppoe' -%}
      {%- set _ = members.append({"interface": "pppoe-out1", "list": "WAN"}) -%}
    {%- else -%}
      {%- set _ = members.append({"interface": "ether1", "list": "WAN"}) -%}
    {%- endif -%}
    {# LAN #}
    {%- set _ = members.append({"interface": "bridge", "list": "LAN"}) -%}
    {%- for net in network_vlans if not net.untagged | default(false) -%}
      {%- set _ = members.append({"interface": "vlan" ~ net.id ~ "-" ~ net.name, "list": "LAN"}) -%}
    {%- endfor -%}
    {{ members }}

  interface_pppoe_client: >-
    {%- if wan_type == 'pppoe' -%}
      {{ [{
        "name": "pppoe-out1",
        "interface": "ether1",
        "user": pppoe_user,
        "password": pppoe_pass,
        "add_default_route": "yes",
        "use_peer_dns": "yes",
        "disabled": "no"
      }] }}
    {%- else -%}
      {{ [] }}
    {%- endif -%}

  bridge_port:
    - bridge: bridge
      interface: sfp-sfpplus1
      # Trunk port
      frame_types: admit-only-vlan-tagged

  bridge_vlan: >-
    {%- set bridge_vlans = [] -%}
    {# Tagged VLANs #}
    {%- for net in network_vlans if not net.untagged | default(false) -%}
      {%- set _ = bridge_vlans.append({
        "bridge": "bridge",
        "tagged": ["bridge", "sfp-sfpplus1"],
        "vlan_ids": net.id
      }) -%}
    {%- endfor -%}
    {# Untagged LAN (VLAN 1) #}
    {%- set _ = bridge_vlans.append({
      "bridge": "bridge",
      "untagged": ["bridge", "sfp-sfpplus1"],
      "vlan_ids": 1
    }) -%}
    {{ bridge_vlans }}

  ip_address: >-
    {%- set ips = [] -%}
    {%- for net in network_vlans -%}
      {%- set interface = "bridge" if net.untagged | default(false) else "vlan" ~ net.id ~ "-" ~ net.name -%}
      {%- set _ = ips.append({
        "address": net.gateway ~ "/" ~ net.subnet.split('/')[-1],
        "interface": interface
      }) -%}
    {%- endfor -%}
    {{ ips }}

  ip_pool: >-
    {%- set pools = [] -%}
    {%- for net in network_vlans -%}
      {%- set _ = pools.append({
        "name": "pool-" ~ net.name,
        "ranges": net.dhcp_pool
      }) -%}
    {%- endfor -%}
    {{ pools }}

  ip_dhcp_server: >-
    {%- set servers = [] -%}
    {%- for net in network_vlans -%}
      {%- set interface = "bridge" if net.untagged | default(false) else "vlan" ~ net.id ~ "-" ~ net.name -%}
      {%- set _ = servers.append({
        "name": "dhcp-" ~ net.name,
        "interface": interface,
        "address_pool": "pool-" ~ net.name
      }) -%}
    {%- endfor -%}
    {{ servers }}

  ip_dhcp_server_network: >-
    {%- set dhcp_nets = [] -%}
    {%- for net in network_vlans -%}
      {%- set _ = dhcp_nets.append({
        "address": net.subnet,
        "gateway": net.gateway,
        "dns_server": net.dns_server
      }) -%}
    {%- endfor -%}
    {{ dhcp_nets }}

  ip_dhcp_server_lease: "{{ network_leases }}"

  ip_dns_static: >-
    {%- set dns = [] -%}
    {%- for entry in network_dns_entries -%}
      {%- set _ = dns.append({
        "name": entry.hostname | default(omit),
        "regexp": entry.regexp | default(omit),
        "address": entry.address
      }) -%}
    {%- endfor -%}
    {{ dns }}

  ip_firewall_address_list: >-
    {%- set lists = [] -%}
    {%- for net in network_vlans -%}
      {%- set _ = lists.append({
        "address": net.subnet,
        "list": "LAN_SUBNETS",
        "comment": net.name
      }) -%}
    {%- endfor -%}
    {# Service Hosts #}
    {%- set _ = lists.extend([
      {"list": "MQTT_SERVER", "address": "192.168.1.19"},
      {"list": "HOME_ASSISTANT", "address": "192.168.1.20"},
      {"list": "SIP_SERVER", "address": "192.168.1.11"},
      {"list": "SMART_DASHBOARD", "address": "192.168.1.156"},
      {"list": "VPN_SUBNET", "address": "192.168.2.0/26"}
    ]) -%}
    {{ lists }}

  ip_firewall_filter:
    # --- Input Chain ---
    - chain: input
      action: accept
      connection_state: established,related,untracked
      comment: "Allow established/related"
    - chain: input
      action: drop
      connection_state: invalid
      comment: "Drop invalid"
    - chain: input
      action: accept
      protocol: icmp
      comment: "Allow ICMP"
    - chain: input
      action: accept
      in_interface_list: LAN
      comment: "Allow LAN to router"
    - chain: input
      action: accept
      protocol: udp
      dst_port: 51194
      comment: "Allow WireGuard Input"
    - chain: input
      action: accept
      protocol: tcp
      dst_port: "22,80"
      in_interface_list: WAN
      comment: "TEMP: Allow SSH/HTTP for initial config"
    - chain: input
      action: drop
      comment: "Drop all other input"

    # --- Forward Chain ---
    - chain: forward
      action: fasttrack_connection
      connection_state: established,related
      comment: "Fasttrack"
    - chain: forward
      action: accept
      connection_state: established,related,untracked
      comment: "Allow established/related"
    - chain: forward
      action: drop
      connection_state: invalid
      comment: "Drop invalid"
    - chain: forward
      action: accept
      connection_nat_state: dstnat
      comment: "Allow Port Forwards"

    # --- Inter-VLAN Rules ---
    - chain: forward
      action: accept
      src_address: 192.168.30.0/24
      dst_address_list: MQTT_SERVER
      protocol: tcp
      dst_port: 1883,8883
      comment: "Allow NoT to MQTT"
    - chain: forward
      action: accept
      src_address: 192.168.30.0/24
      dst_address_list: HOME_ASSISTANT
      protocol: tcp
      dst_port: 8123
      comment: "Allow NoT to Home Assistant"
    - chain: forward
      action: accept
      src_address: 192.168.30.0/24
      dst_address_list: SIP_SERVER
      protocol: udp
      dst_port: 5060,5160
      comment: "Allow NoT to SIP UDP"
    - chain: forward
      action: accept
      src_address: 192.168.30.0/24
      dst_address_list: SIP_SERVER
      protocol: tcp
      dst_port: 5060,5160
      comment: "Allow NoT to SIP TCP"
    - chain: forward
      action: accept
      src_address: 192.168.30.0/24
      dst_address_list: SMART_DASHBOARD
      protocol: tcp
      dst_port: 80
      comment: "Allow NoT to SmartDashboard"
    - chain: forward
      action: accept
      src_address_list: VPN_SUBNET
      dst_address_list: LAN_SUBNETS
      comment: "Allow VPN to all local networks"

    # --- Isolation Rules ---
    - chain: forward
      action: drop
      src_address: 192.168.20.0/24
      dst_address: 192.168.1.0/24
      comment: "Drop IoT to LAN"
    - chain: forward
      action: drop
      src_address: 192.168.20.0/24
      dst_address: 192.168.30.0/24
      comment: "Drop IoT to NoT"
    - chain: forward
      action: drop
      src_address: 192.168.30.0/24
      dst_address: 192.168.20.0/24
      comment: "Drop NoT to IoT"
    - chain: forward
      action: drop
      src_address: 192.168.50.0/24
      dst_address_list: LAN_SUBNETS
      comment: "Drop Guest to internal networks"
    - chain: forward
      action: drop
      src_address: 192.168.30.0/24
      comment: "Drop NoT to everything else (Isolation)"
    - chain: forward
      action: accept
      in_interface_list: LAN
      out_interface_list: WAN
      comment: "Allow LAN to WAN"
    - chain: forward
      action: drop
      comment: "Drop all other forward"

  ip_firewall_nat:
    - chain: srcnat
      out_interface_list: WAN
      action: masquerade
      comment: "Masquerade"
    # Port Forwards
    - chain: dstnat
      protocol: tcp
      dst_port: 6881
      action: dst-nat
      to_addresses: 192.168.1.21
      to_ports: 50413
      comment: "Torrent TCP"
    - chain: dstnat
      protocol: udp
      dst_port: 6881
      action: dst-nat
      to_addresses: 192.168.1.21
      to_ports: 50413
      comment: "Torrent UDP"
    - chain: dstnat
      protocol: udp
      dst_port: 51194
      action: dst-nat
      to_addresses: 192.168.1.11
      comment: "Wireguard to internal node"

  ip_dhcp_client: >-
    {%- if wan_type == 'dhcp' -%}
      {{ [{
        "interface": "ether1",
        "add_default_route": "yes",
        "use_peer_dns": "yes"
      }] }}
    {%- else -%}
      {{ [] }}
    {%- endif -%}
